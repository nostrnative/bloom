<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Blossom</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #ffffff;
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background-color: #ffffff;
      }
      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .loader-logo {
        width: 160px;
        height: 160px;
        object-fit: contain;
        filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.4));
        animation: loader-bounce 3s ease-in-out infinite;
      }
      @keyframes loader-bounce {
        0%,
        100% {
          transform: translateY(-5%);
        }
        50% {
          transform: translateY(0);
        }
      }
    </style>
    <link rel="preload" href="/blostr.png" as="image" />
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="loader-content">
          <img src="/blostr.png" class="loader-logo" alt="Blossom" />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
