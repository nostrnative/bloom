name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Release (${{ matrix.name }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: MacOS-ARM
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: MacOS-Intel
          - platform: windows-latest
            args: ''
            name: Windows
          - platform: ubuntu-latest
            args: ''
            name: Linux
          - platform: ubuntu-latest
            args: --target x86_64-unknown-linux-gnu --config '{"productName":"bloom-cachyos-x86_64-v3"}'
            rustflags: '-C target-cpu=x86-64-v3'
            name: CachyOS
          - platform: ubuntu-latest
            args: '--target aarch64-linux-android'
            name: Android

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libglib2.0-dev

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || (matrix.name == 'Android' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || '') }}
          components: clippy

      - name: Setup Java
        if: matrix.name == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        if: matrix.name == 'Android'
        id: setup-android
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;27.0.12077973'

      - name: Set NDK Env
        if: matrix.name == 'Android'
        run: |
          echo "NDK_HOME=${{ steps.setup-android.outputs.sdk-path }}/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${{ steps.setup-android.outputs.sdk-path }}/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "${{ steps.setup-android.outputs.sdk-path }}/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Decode Keystore
        if: matrix.name == 'Android'
        run: |
          mkdir -p src-tauri/gen/android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > src-tauri/gen/android/app/release.keystore
          echo "// Cleared by CI to be re-generated" > src-tauri/gen/android/tauri.settings.gradle

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Verify build
        if: matrix.name != 'Android'
        env:
          RUSTFLAGS: ${{ matrix.rustflags || '' }}
        run: |
          npm run tauri build -- --no-bundle ${{ matrix.args }}

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: ${{ matrix.rustflags || '' }}
          NDK_HOME: ${{ steps.setup-android.outputs.sdk-path }}/ndk/27.0.12077973
          ANDROID_NDK_HOME: ${{ steps.setup-android.outputs.sdk-path }}/ndk/27.0.12077973
          CC_aarch64_linux_android: ${{ steps.setup-android.outputs.sdk-path }}/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: v__VERSION__
          releaseName: 'Bloom v__VERSION__'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
