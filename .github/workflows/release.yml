name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout blossom
        uses: actions/checkout@v4
        with:
          path: blossom

      - name: Checkout nostrnative
        uses: actions/checkout@v4
        with:
          # Assumes nostrnative is in the same organization/user
          repository: ${{ github.repository_owner }}/nostrnative
          path: nostrnative
          # If nostrnative is private, you will need to provide a Personal Access Token (PAT)
          # via secrets.GH_PAT. Otherwise, GITHUB_TOKEN might work if it's the same owner.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: blossom/src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: blossom/package-lock.json

      - name: Install frontend dependencies
        working-directory: blossom
        run: npm install

      - name: Run quality checks
        working-directory: blossom
        run: npm run check

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: blossom
          tagName: v__VERSION__
          releaseName: 'Bloom v__VERSION__'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
